name: Build Raspberry Pi Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare workspace packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binfmt-support \
            coreutils \
            qemu-user \
            qemu-user-binfmt \
            qemu-user-static \
            rsync \
            xz-utils \
            zip
          sudo update-binfmts --enable qemu-arm || true
          sudo update-binfmts --enable qemu-aarch64 || true
          command -v qemu-arm
          command -v qemu-arm-static
          update-binfmts --display qemu-arm || true

      - name: Clone pi-gen
        run: |
          git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git .pi-gen

      - name: Inject custom stage and application files
        run: |
          mkdir -p .pi-gen/stage-anpr/files/opt/anpr-pi
          rsync -a \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.pi-gen' \
            --exclude 'deploy' \
            --exclude 'dist' \
            --exclude 'build' \
            --exclude '__pycache__' \
            --exclude 'data' \
            ./ .pi-gen/stage-anpr/files/opt/anpr-pi/
          rsync -a image/pi-gen/ .pi-gen/

      - name: Build image with pi-gen
        run: |
          cd .pi-gen
          sudo ./build-docker.sh

      - name: Collect image artifacts
        run: |
          mkdir -p artifacts
          find .pi-gen/deploy -maxdepth 1 -type f \( -name '*.img' -o -name '*.img.xz' -o -name '*.zip' \) -exec cp {} artifacts/ \;
          if compgen -G "artifacts/*.img" > /dev/null; then
            for image in artifacts/*.img; do
              xz -T0 -9 "$image"
            done
          fi
          sha256sum artifacts/* > artifacts/SHA256SUMS.txt

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anpr-pi-image
          path: artifacts/
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --notes "Flash the .img.xz file directly to a Raspberry Pi SD card." || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/* --repo "${GITHUB_REPOSITORY}" --clobber
