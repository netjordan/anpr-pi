name: Python Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Compile sources
        run: |
          python -m compileall src
