name: Build Raspberry Pi Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Raspberry Pi OS image
        id: build
        uses: usimd/pi-gen-action@v1
        with:
          image-name: anpr-pi
          hostname: anprpi
          username: pi
          password: raspberry
          disable-first-boot-user-rename: 1
          enable-ssh: 0
          compression: xz
          compression-level: 6
          release: bookworm
          pi-gen-version: arm64
          locale: en_GB.UTF-8
          keyboard-keymap: gb
          keyboard-layout: English (UK)
          timezone: Europe/London
          stage-list: stage0 stage1 stage2 ./image/pi-gen/stage-anpr
          export-last-stage-only: true
          increase-runner-disk-size: true
          verbose-output: true

      - name: Collect image artifacts
        run: |
          mkdir -p artifacts
          cp "${{ steps.build.outputs.image-path }}" artifacts/
          sha256sum artifacts/* > artifacts/SHA256SUMS.txt

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anpr-pi-image
          path: artifacts/
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --notes "Flash the .img.xz file directly to a Raspberry Pi SD card." || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/* --repo "${GITHUB_REPOSITORY}" --clobber
